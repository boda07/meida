document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 onchange=\"{{ setQ }}\" placeholder=\"Pesquisar títulos…\" style=\"flex:1;background:transparent;border:none;outline:none;color:#fff;font-family:inherit;font-size:clamp(22px,4vw,30px);font-weight:700;\">\n      <\u002Fdiv>\n      <div style=\"max-width:1100px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px;\">\n        <sc-for list=\"{{ results }}\" as=\"item\" hint-placeholder-count=\"0\">\n          <div onclick=\"{{ item.onClick }}\" style=\"position:relative;height:230px;border-radius:11px;overflow:hidden;cursor:pointer;background:#15151b;transition:transform .2s ease;\" style-hover=\"transform:scale(1.04)\">\n            <div style=\"position:absolute;inset:0;background:{{ item.bg }};\"><\u002Fdiv>\n            <div style=\"position:absolute;inset:0;background:linear-gradient(0deg,rgba(0,0,0,0.82) 2%,rgba(0,0,0,0) 56%);\"><\u002Fdiv>\n            <div style=\"position:absolute;left:11px;right:11px;bottom:10px;\"><div style=\"font-size:14px;font-weight:800;color:#fff;line-height:1.12;\">{{ item.title }}<\u002Fdiv><div style=\"font-size:11px;font-weight:600;color:rgba(255,255,255,0.6);margin-top:3px;\">{{ item.sub }}<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  \n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:&quot;100%&quot;},&quot;brandName&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;MEIDA&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;accent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#c90303&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;startTab&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;home&quot;,&quot;options&quot;:[&quot;home&quot;,&quot;movies&quot;,&quot;tv&quot;,&quot;anime&quot;],&quot;tsType&quot;:&quot;string&quot;}}\">\nclass Component extends DCLogic {\n  state = { tab: null, muted: true, modal: null, searchOpen: false, q: \"\", menuOpen: false };\n\n  G = [\n    \"linear-gradient(150deg,#243a5e,#0a121f)\",\n    \"linear-gradient(150deg,#4a2238,#160a12)\",\n    \"linear-gradient(150deg,#1c4038,#08150f)\",\n    \"linear-gradient(150deg,#4a3418,#160e05)\",\n    \"linear-gradient(150deg,#33205a,#0e0820)\",\n    \"linear-gradient(150deg,#16404f,#06141a)\",\n    \"linear-gradient(150deg,#4a1d1d,#160707)\",\n    \"linear-gradient(150deg,#2b2f52,#0b0d1c)\"\n  ];\n\n  data() {\n    const G = this.G;\n    const mk = (arr, type, off) => arr.map((t, i) => ({ id: type + \"-\" + i, title: t[0], sub: t[1], tag: t[2], type, bg: G[(i + off) % G.length] }));\n    const anime = mk([\n      [\"Frieren\", \"Fantasy · 2024\", \"NOVO EP\"],\n      [\"Solo Leveling\", \"Ação · 2024\", \"TOP 10\"],\n      [\"Jujutsu Kaisen\", \"Ação · 2023\", \"\"],\n      [\"Chainsaw Man\", \"Ação · 2023\", \"\"],\n      [\"Dandadan\", \"Sci-Fi · 2024\", \"NOVO\"],\n      [\"Spy x Family\", \"Comédia · 2024\", \"\"],\n      [\"Demon Slayer\", \"Ação · 2024\", \"\"],\n      [\"Apothecary Diaries\", \"Drama · 2024\", \"TOP 10\"]\n    ], \"anime\", 0);\n    const movie = mk([\n      [\"Afterlight\", \"Drama · 2025\", \"\"],\n      [\"Paper Cities\", \"Thriller · 2024\", \"NOVO\"],\n      [\"The Quiet North\", \"Drama · 2024\", \"\"],\n      [\"Velvet Road\", \"Crime · 2023\", \"\"],\n      [\"Glasshouse\", \"Sci-Fi · 2025\", \"TOP 10\"],\n      [\"Tidewater\", \"Aventura · 2024\", \"\"],\n      [\"Ironbound\", \"Ação · 2023\", \"\"],\n      [\"Lantern\", \"Mistério · 2025\", \"NOVO\"]\n    ], \"movie\", 2);\n    const tv = mk([\n      [\"Saltline\", \"Drama · 2024\", \"\"],\n      [\"The Foundry\", \"Thriller · 2025\", \"NOVO\"],\n      [\"Northwind\", \"Drama · 2023\", \"\"],\n      [\"Lowtown\", \"Crime · 2024\", \"TOP 10\"],\n      [\"Greyhour\", \"Mistério · 2024\", \"\"],\n      [\"Hollowpoint\", \"Ação · 2023\", \"\"],\n      [\"Brackish\", \"Sci-Fi · 2025\", \"\"],\n      [\"Cinderfall\", \"Fantasy · 2024\", \"NOVO\"]\n    ], \"tv\", 4);\n    return { anime, movie, tv };\n  }\n\n  featuredFor(tab) {\n    if (tab === \"movies\") return { brand: \"MEIDA FILME\", title: \"Afterlight\", word: \"AFTERLIGHT\", desc: \"Um cartógrafo em luto descobre uma cidade que só aparece ao anoitecer — e as pessoas que nunca a deixaram.\", meta: \"2025 · 2h 08m · M/15 · Drama\", heroBg: \"radial-gradient(120% 130% at 72% 28%, #4a2238 0%, #160a12 55%, #08060a 100%)\", bg: \"radial-gradient(120% 130% at 72% 28%, #4a2238 0%, #160a12 55%, #08060a 100%)\" };\n    if (tab === \"tv\") return { brand: \"MEIDA ORIGINAL\", title: \"Saltline\", word: \"SALTLINE\", desc: \"Numa costa piscatória coberta de nevoeiro, uma detetive regressa a casa para um caso que toda a vila concordou esquecer.\", meta: \"2024 · 2 Temporadas · M/15 · Drama\", heroBg: \"radial-gradient(120% 130% at 72% 28%, #1c4038 0%, #08150f 55%, #04080a 100%)\", bg: \"radial-gradient(120% 130% at 72% 28%, #1c4038 0%, #08150f 55%, #04080a 100%)\" };\n    return { brand: \"MEIDA ANIME\", title: \"Frieren\", word: \"FRIEREN\", desc: \"Depois de o rei demónio cair, a maga elfa Frieren parte numa viagem tranquila para compreender os humanos que sobreviveu.\", meta: \"2024 · 28 Episódios · M/14 · Fantasia\", heroBg: \"radial-gradient(120% 130% at 72% 28%, #243a5e 0%, #0a121f 55%, #05080f 100%)\", bg: \"radial-gradient(120% 130% at 72% 28%, #243a5e 0%, #0a121f 55%, #05080f 100%)\" };\n  }\n\n  rowsFor(tab) {\n    const d = this.data();\n    const cw = (items) => items.map((x) => ({ ...x }));\n    if (tab === \"movies\") return [\n      { id: \"rm1\", title: \"Filmes em Destaque\", cardW: 300, cardH: 170, items: cw(d.movie) },\n      { id: \"rm2\", title: \"Estreias\", cardW: 184, cardH: 272, items: cw([...d.movie].reverse()) },\n      { id: \"rm3\", title: \"Aclamados pela Crítica\", cardW: 184, cardH: 272, items: cw(d.movie.slice(3).concat(d.movie.slice(0, 3))) }\n    ];\n    if (tab === \"tv\") return [\n      { id: \"rt1\", title: \"Séries em Destaque\", cardW: 300, cardH: 170, items: cw(d.tv) },\n      { id: \"rt2\", title: \"Novas Temporadas\", cardW: 184, cardH: 272, items: cw([...d.tv].reverse()) },\n      { id: \"rt3\", title: \"Para Maratonar\", cardW: 184, cardH: 272, items: cw(d.tv.slice(2).concat(d.tv.slice(0, 2))) }\n    ];\n    if (tab === \"anime\") return [\n      { id: \"ra1\", title: \"Anime em Destaque\", cardW: 300, cardH: 170, items: cw(d.anime) },\n      { id: \"ra2\", title: \"Simulcasts desta Temporada\", cardW: 184, cardH: 272, items: cw(d.anime) },\n      { id: \"ra3\", title: \"Êxitos Shonen\", cardW: 184, cardH: 272, items: cw(d.anime.slice(1).concat(d.anime.slice(0, 1))) },\n      { id: \"ra4\", title: \"Slice of Life\", cardW: 184, cardH: 272, items: cw([...d.anime].reverse()) }\n    ];\n    const cont = cw([d.anime[0], d.movie[1], d.tv[3], d.anime[3], d.movie[4]]).map((x, i) => ({ ...x, progress: [68, 32, 80, 15, 50][i] }));\n    return [\n      { id: \"rh1\", title: \"Em Tendência\", cardW: 300, cardH: 170, items: cw([d.anime[1], d.movie[4], d.anime[0], d.tv[1], d.movie[1], d.anime[4], d.tv[3]]) },\n      { id: \"rh2\", title: \"Continuar a Ver\", cardW: 300, cardH: 170, items: cont },\n      { id: \"rh3\", title: \"Anime Popular\", cardW: 184, cardH: 272, items: cw(d.anime) },\n      { id: \"rh4\", title: \"Novos Filmes\", cardW: 184, cardH: 272, items: cw(d.movie) },\n      { id: \"rh5\", title: \"Séries para Ti\", cardW: 184, cardH: 272, items: cw(d.tv) }\n    ];\n  }\n\n  renderVals() {\n    const accent = this.props.accent ?? \"#7c5cff\";\n    const brandName = this.props.brandName ?? \"MEIDA\";\n    const tab = this.state.tab ?? this.props.startTab ?? \"home\";\n    const navStyle = (key) => {\n      const a = tab === key;\n      return \"display:flex;align-items:center;gap:7px;padding:9px 15px;border-radius:999px;border:none;font-family:inherit;font-weight:600;font-size:14px;cursor:pointer;transition:background .2s,color .2s;\" + (a ? \"background:#fff;color:#0a0a0b;\" : \"background:transparent;color:rgba(255,255,255,0.82);\");\n    };\n    const rows = this.rowsFor(tab);\n    const scroll = (id, dir) => { const el = document.getElementById(id); if (el) el.scrollBy({ left: dir * el.clientWidth * 0.85, behavior: \"smooth\" }); };\n    const open = (it) => () => this.setState({ modal: { ...it, meta: it.meta || it.sub, desc: it.desc || (\"Vê agora em 4K Ultra HD — só na \" + brandName + \".\") } });\n    rows.forEach((r) => {\n      r.scrollL = () => scroll(r.id, -1);\n      r.scrollR = () => scroll(r.id, 1);\n      r.items.forEach((it) => { it.onClick = open(it); });\n    });\n    const featured = this.featuredFor(tab);\n    const q = this.state.q.trim().toLowerCase();\n    let results = [];\n    if (q) { const d = this.data(); results = [...d.anime, ...d.movie, ...d.tv].filter((x) => x.title.toLowerCase().includes(q)).map((x) => ({ ...x, onClick: open(x) })); }\n    return {\n      accent, brandName,\n      navHome: navStyle(\"home\"), navMovies: navStyle(\"movies\"), navTv: navStyle(\"tv\"), navAnime: navStyle(\"anime\"),\n      tabHome: () => this.setState({ tab: \"home\", menuOpen: false }),\n      tabMovies: () => this.setState({ tab: \"movies\", menuOpen: false }),\n      tabTv: () => this.setState({ tab: \"tv\", menuOpen: false }),\n      tabAnime: () => this.setState({ tab: \"anime\", menuOpen: false }),\n      featured, rows,\n      muted: this.state.muted, notMuted: !this.state.muted,\n      toggleMute: () => this.setState((s) => ({ muted: !s.muted })),\n      onPlay: () => this.setState({ modal: { ...featured } }),\n      modal: this.state.modal, closeModal: () => this.setState({ modal: null }),\n      stop: (e) => e.stopPropagation(),\n      searchOpen: this.state.searchOpen,\n      openSearch: () => this.setState({ searchOpen: true, menuOpen: false }),\n      closeSearch: () => this.setState({ searchOpen: false, q: \"\" }),\n      q: this.state.q, setQ: (e) => this.setState({ q: e.target.value }), results,\n      menuOpen: this.state.menuOpen, toggleMenu: () => this.setState((s) => ({ menuOpen: !s.menuOpen })),\n      scrollDown: () => window.scrollBy({ top: window.innerHeight * 0.8, behavior: \"smooth\" })\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
